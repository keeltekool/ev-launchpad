<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Launchpad — Monitor</title>
  <meta name="description" content="System health dashboard for monitored projects." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <script>
    (function () {
      try {
        var t = localStorage.getItem("launchpad-theme");
        if (t !== "light" && t !== "dark") {
          t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page">

    <header class="site-header">
      <div class="header-row">
        <div class="brand">
          <img class="brand__logo" src="assets/logo.svg" alt="" width="30" height="30" />
          <h1 class="brand__name">Launchpad</h1>
        </div>
        <nav class="header-nav">
          <a href="index.html" class="nav-pill">Projects</a>
          <a href="monitor.html" class="nav-pill nav-pill--active">Monitor</a>
        </nav>
        <div class="header-row__spacer"></div>
        <button id="theme-toggle" class="theme-toggle" type="button"
                aria-label="Toggle light / dark theme" title="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
          </svg>
        </button>
      </div>
      <p class="tagline">System health for monitored projects.
        <button id="refresh-btn" class="refresh-btn" type="button" title="Refresh data">↻ Refresh</button>
      </p>
    </header>

    <main>
      <div id="grid" class="grid grid--monitor"></div>
      <p id="loading" class="status-line is-visible">Loading health data…</p>
      <p id="status-line" class="status-line"></p>
    </main>

    <footer class="site-footer">
      Personal project dashboard
    </footer>

  </div>

  <script src="js/monitor.js"></script>
</body>
</html>
