<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Launchpad</title>
  <meta name="description" content="Personal project dashboard for quick access to all live apps." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- No-flash theme: set the attribute before first paint -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("launchpad-theme");
        if (t !== "light" && t !== "dark") {
          t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page">

    <header class="site-header">
      <div class="header-row">
        <div class="brand">
          <img class="brand__logo" src="assets/logo.svg" alt="" width="30" height="30" />
          <h1 class="brand__name">Launchpad</h1>
        </div>
        <div class="header-row__spacer"></div>
        <button id="theme-toggle" class="theme-toggle" type="button"
                aria-label="Toggle light / dark theme" title="Toggle theme">
          <!-- shown in dark mode: switch to light -->
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
          </svg>
          <!-- shown in light mode: switch to dark -->
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
          </svg>
        </button>
      </div>
      <p class="tagline">Quick access to all live projects.</p>
    </header>

    <div class="search" id="search">
      <svg class="search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m20 20-3.5-3.5"></path>
      </svg>
      <input id="search-input" class="search__input" type="text"
             placeholder="Search projects..." autocomplete="off"
             spellcheck="false" aria-label="Search projects" />
      <button id="search-clear" class="search__clear" type="button" aria-label="Clear search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <main>
      <div id="grid" class="grid"></div>
      <p id="empty" class="empty">No projects match your search.</p>
    </main>

    <footer class="site-footer">
      Personal project dashboard
    </footer>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
